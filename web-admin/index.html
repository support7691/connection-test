<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connection Test - Admin</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; margin: 0; padding: 16px; background: #0f0f0f; color: #e0e0e0; }
    h1 { font-size: 1.25rem; margin: 0 0 16px; color: #fff; }
    .card { background: #1a1a1a; border-radius: 8px; padding: 16px; margin-bottom: 12px; }
    .device { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
    .device-id { font-family: monospace; color: #888; }
    .status { font-size: 0.85rem; }
    .status.connected { color: #4ade80; }
    .status.disconnected { color: #f87171; }
    button { background: #333; color: #fff; border: none; padding: 8px 14px; border-radius: 6px; cursor: pointer; font-size: 0.9rem; }
    button:hover { background: #444; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    button.primary { background: #2563eb; }
    button.primary:hover { background: #3b82f6; }
    button.danger { background: #dc2626; }
    button.danger:hover { background: #ef4444; }
    .actions { display: flex; gap: 8px; flex-wrap: wrap; }
    #audioStatus { font-size: 0.85rem; color: #888; margin-top: 8px; }
    #location { font-size: 0.85rem; color: #a78bfa; margin-top: 8px; white-space: pre-wrap; word-break: break-all; }
    .empty { color: #666; font-size: 0.9rem; }
    input[type="text"] { background: #222; border: 1px solid #333; color: #fff; padding: 8px; border-radius: 6px; width: 100%; max-width: 280px; }
    label { display: block; font-size: 0.8rem; color: #888; margin-bottom: 4px; }
  </style>
</head>
<body>
  <h1>Connection Test - Admin</h1>
  <div class="card">
    <label>Backend URL (e.g. http://YOUR_IP:3000)</label>
    <input type="text" id="backendUrl" placeholder="http://192.168.1.100:4000" />
  </div>
  <div class="card">
    <div id="deviceList">Loading...</div>
  </div>
  <div class="card" id="controlPanel" style="display: none;">
    <div class="device-id" id="selectedDeviceId"></div>
    <div class="actions" style="margin-top: 8px;">
      <button class="primary" id="btnStartListen">Start listening</button>
      <button class="danger" id="btnStopListen" style="display: none;">Stop listening</button>
      <button id="btnLocation">Get location</button>
    </div>
    <div id="audioStatus"></div>
    <div id="location"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
